# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Claude Code
#
# Usage:
#   docker compose run --rm claude                    # interactive session
#   docker compose run --rm claude "Fix the tests"    # one-shot prompt
#   docker compose run --rm claude-unsafe "Refactor"  # skip permission prompts
#
# Preconditions (bind mounts require the source path to exist on the host):
#   mkdir -p ~/.claude ~/.config/gh
#   touch ~/.claude.json
#   # ~/.gitconfig and ~/.ssh: assumed present on a developer machine.
#   # ~/.aws: only required if you uncomment the optional mount below.
#
# For a launcher that handles these preconditions automatically and guards
# optional mounts, use ./claudeboxed instead.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Standard interactive session ─────────────────────────────────────────
  claude:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-code:latest

    # Using claude.ai login — no API key needed.
    # To switch to API key auth: set ANTHROPIC_API_KEY and add it here,
    # then remove the ~/.claude.json volume mount below.
    environment:
      - GH_TOKEN=${GH_TOKEN}
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Uncomment to point at a custom endpoint (e.g. Docker Model Runner):
      # - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - AWS_REGION=${AWS_REGION:-}
      - AWS_PROFILE=${AWS_PROFILE:-}

    volumes:
      # ── Your project (read/write) ────────────────────────────────────────
      - type: bind
        source: ${WORKSPACE_PATH:-.}
        target: /workspace

      # ── Claude config & memory (persists across container runs) ──────────
      - type: bind
        source: ${HOME}/.claude
        target: /home/claude/.claude

      # ── Claude main config file ───────────────────────────────────────────
      - type: bind
        source: ${HOME}/.claude.json
        target: /home/claude/.claude.json

      # ── Git config (read-only) ────────────────────────────────────────────
      # On Linux with XDG layout, change source to: ${HOME}/.config/git/config
      - type: bind
        source: ${HOME}/.gitconfig
        target: /home/claude/.gitconfig
        read_only: true

      # ── GitHub CLI auth (read-write, persists OAuth token) ─────────────────
      # Same path on macOS and Linux (~/.config/gh).
      # Create with: mkdir -p ~/.config/gh
      - type: bind
        source: ${HOME}/.config/gh
        target: /home/claude/.config/gh

      # ── SSH keys for git push/pull (read-only) ────────────────────────────
      - type: bind
        source: ${HOME}/.ssh
        target: /home/claude/.ssh
        read_only: true

      # ── AWS credentials (optional; uncomment if you use AWS) ─────────────
      # Commented out by default because Compose has no conditional mount —
      # including it unconditionally would break `docker compose run` on any
      # host without ~/.aws. The claudeboxed launcher guards this automatically.
      # - type: bind
      #   source: ${HOME}/.aws
      #   target: /home/claude/.aws
      #   read_only: true

      # ── ClaudeBoxed marketplace (plugins loaded via --plugin-dir) ────────
      - type: bind
        source: ./ClaudeBoxedMarket
        target: /opt/claude-market

      # ── Docker socket — lets Claude build/run sibling containers ─────────
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock

    # Containers built by Claude are siblings on the host Docker daemon.
    # Use host.docker.internal to reach services running on the host / in
    # sibling containers. On Linux, add-host makes this name resolve.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    working_dir: /workspace
    stdin_open: true
    tty: true

  # ── Unsafe mode: skips permission prompts (use inside containers only!) ───
  claude-unsafe:
    extends:
      service: claude
    command: ["--dangerously-skip-permissions"]
